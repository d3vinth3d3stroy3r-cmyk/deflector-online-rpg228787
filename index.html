<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DEFLECTOR ONLINE RPG ULTIMATE</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#050510;
color:white;
}

canvas{
display:block;
background:#101020;
touch-action:none;
}

#menu{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#050510;
z-index:100;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:#111122cc;
padding:10px;
border:2px solid #00ffcc;
z-index:10;
width:300px;
max-height:95vh;
overflow:auto;
}

button{
padding:10px 14px;
margin:4px;
border:none;
background:#00ffcc;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

.inventory,.partyBox{
margin-top:10px;
max-height:120px;
overflow:auto;
background:#0006;
padding:5px;
}

#chat{
position:absolute;
bottom:10px;
left:10px;
width:320px;
background:#111122cc;
padding:10px;
z-index:10;
}

input{
padding:8px;
width:180px;
}

#deathScreen{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:#000d;
z-index:999;
font-size:40px;
}

.mobileControls{
position:fixed;
right:20px;
bottom:20px;
z-index:999;
}

.mobileControls button{
width:70px;
height:70px;
font-size:20px;
}
</style>
</head>
<body>

<div id="menu">
<h1 style="color:#00ffcc;font-size:60px;">
DEFLECTOR ONLINE RPG
</h1>

<input id="username" placeholder="ENTER NAME">

<button onclick="startGame()">
PLAY GAME
</button>
</div>

<div id="ui">

<div>PLAYER: <span id="playerName">NONE</span></div>
<div>LEVEL: <span id="level">1</span></div>
<div>XP: <span id="xp">0</span></div>
<div>HP: <span id="hp">100</span></div>
<div>COINS: <span id="coins">0</span></div>
<div>MAP: <span id="mapName">GRASSLAND</span></div>

<button onclick="spawnPet()">PET</button>
<button onclick="craftItem()">CRAFT</button>
<button onclick="spawnBoss()">BOSS</button>
<button onclick="toggleArena()">PVP</button>

<button onclick="saveGame()">SAVE</button>
<button onclick="loadGame()">LOAD</button>

<button onclick="inviteFriend()">PARTY</button>

<button onclick="startVoice()">
VOICE
</button>

<div class="partyBox">
<b>PARTY</b>
<div id="partyList"></div>
</div>

<div class="quest">
QUEST:
<span id="questText">
Defeat 5 enemies
</span>
</div>

<div class="inventory">
<b>INVENTORY</b>
<div id="inventory"></div>
</div>

</div>

<div id="chat">
<div id="messages"></div>

<input id="chatInput" placeholder="chat">

<button onclick="sendMessage()">
SEND
</button>
</div>

<div id="deathScreen">
<div style="color:red;">
YOU DIED
</div>

<div id="respawnText"></div>
</div>

<div class="mobileControls">

<button ontouchstart="mobile.up=true"
ontouchend="mobile.up=false">↑</button>

<br>

<button ontouchstart="mobile.left=true"
ontouchend="mobile.left=false">←</button>

<button ontouchstart="mobile.down=true"
ontouchend="mobile.down=false">↓</button>

<button ontouchstart="mobile.right=true"
ontouchend="mobile.right=false">→</button>

</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let gameStarted = false;
let pvpMode = false;

const keys = {};

const mobile = {
up:false,
down:false,
left:false,
right:false
};

addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

const player = {
x:500,
y:500,
size:25,
speed:5,
hp:100,
level:1,
xp:0,
coins:0,
name:"",
pet:null
};

const camera = {
x:0,
y:0
};

const enemies = [];
const bullets = [];
const pets = [];
const bosses = [];
const particles = [];
const inventory = [];
const party = [];
const graves = [];

let dead = false;
let respawnTimer = 0;

let zoneRadius = 3000;

const maps = [
"GRASSLAND",
"DESERT",
"ICE",
"VOLCANO"
];

function currentMap(){

return maps[
Math.abs(
Math.floor(player.x/3000)
)%maps.length
];

}

function startGame(){

player.name =
document.getElementById("username").value || "PLAYER";

document.getElementById("playerName")
.textContent = player.name;

document.getElementById("menu")
.style.display="none";

gameStarted = true;

}

canvas.addEventListener("click",e=>{

if(!gameStarted || dead) return;

const angle = Math.atan2(
e.clientY-canvas.height/2,
e.clientX-canvas.width/2
);

bullets.push({
x:player.x,
y:player.y,
dx:Math.cos(angle)*10,
dy:Math.sin(angle)*10,
size:6
});

});

function spawnEnemy(){

const angle = Math.random()*Math.PI*2;

enemies.push({
x:player.x+Math.cos(angle)*900,
y:player.y+Math.sin(angle)*900,
size:20,
hp:5+player.level,
speed:1+Math.random()*2
});

}

function spawnBoss(){

bosses.push({
x:player.x+700,
y:player.y,
size:80,
hp:200,
speed:1.2
});

}

function spawnPet(){

pets.push({
x:player.x,
y:player.y,
size:15,
color:"lime"
});

inventory.push("PET CORE");

updateInventory();

}

function craftItem(){

if(player.coins>=20){

player.coins-=20;

inventory.push("MEGA SWORD");

updateInventory();

}

}

function updateInventory(){

document.getElementById("inventory")
.innerHTML = inventory.join("<br>");

}

function toggleArena(){

pvpMode=!pvpMode;

alert(
pvpMode ?
"PVP ENABLED" :
"PVP DISABLED"
);

}

function inviteFriend(){

const name = prompt("Friend name");

if(name){

party.push(name);

updateParty();

}

}

function updateParty(){

document.getElementById("partyList")
.innerHTML = party.join("<br>");

}

function sendMessage(){

const input =
document.getElementById("chatInput");

const msg = input.value;

if(msg.length<1) return;

const div = document.createElement("div");

div.textContent =
player.name + ": " + msg;

document.getElementById("messages")
.appendChild(div);

input.value="";

}

function saveGame(){

const saveData = {
player,
inventory,
party
};

localStorage.setItem(
"deflectorSave",
JSON.stringify(saveData)
);

alert("GAME SAVED");

}

function loadGame(){

const data = JSON.parse(
localStorage.getItem("deflectorSave")
);

if(!data) return;

Object.assign(player,data.player);

inventory.length=0;

data.inventory.forEach(i=>{
inventory.push(i);
});

party.length=0;

data.party.forEach(p=>{
party.push(p);
});

updateInventory();
updateParty();

alert("SAVE LOADED");

}

async function startVoice(){

try{

await navigator.mediaDevices
.getUserMedia({
audio:true
});

alert("VOICE CHAT READY");

}catch{

alert("MICROPHONE BLOCKED");

}

}

function die(){

dead = true;

respawnTimer = 300;

graves.push({
x:player.x,
y:player.y
});

document.getElementById("deathScreen")
.style.display="flex";

}

function respawn(){

dead = false;

player.hp = 100;

player.x = 500;
player.y = 500;

document.getElementById("deathScreen")
.style.display="none";

}

function update(){

if(!gameStarted) return;

if(dead){

respawnTimer--;

document.getElementById("respawnText")
.textContent =
"RESPAWNING IN " +
Math.ceil(respawnTimer/60);

if(respawnTimer <= 0){

respawn();

}

return;

}

if(keys["w"] || mobile.up)
player.y-=player.speed;

if(keys["s"] || mobile.down)
player.y+=player.speed;

if(keys["a"] || mobile.left)
player.x-=player.speed;

if(keys["d"] || mobile.right)
player.x+=player.speed;

camera.x = player.x-canvas.width/2;
camera.y = player.y-canvas.height/2;

zoneRadius -= 0.02;

const zoneDist =
Math.hypot(player.x,player.y);

if(zoneDist > zoneRadius){

player.hp -= 0.05;

}

bullets.forEach((b,bi)=>{

b.x+=b.dx;
b.y+=b.dy;

});

enemies.forEach((e,ei)=>{

const angle = Math.atan2(
player.y-e.y,
player.x-e.x
);

e.x+=Math.cos(angle)*e.speed;
e.y+=Math.sin(angle)*e.speed;

const dist = Math.hypot(
player.x-e.x,
player.y-e.y
);

if(dist < player.size+e.size){

player.hp-=0.2;

if(player.hp<=0){

die();

}

}

bullets.forEach((b,bi)=>{

const d = Math.hypot(
b.x-e.x,
b.y-e.y
);

if(d<e.size){

e.hp--;

bullets.splice(bi,1);

if(e.hp<=0){

player.xp+=10;
player.coins+=5;

enemies.splice(ei,1);

inventory.push("MONSTER PART");

updateInventory();

}

}

});

});

bosses.forEach((boss,bi)=>{

const angle = Math.atan2(
player.y-boss.y,
player.x-boss.x
);

boss.x+=Math.cos(angle)*boss.speed;
boss.y+=Math.sin(angle)*boss.speed;

const dist = Math.hypot(
player.x-boss.x,
player.y-boss.y
);

if(dist < player.size+boss.size){

player.hp-=0.5;

if(player.hp<=0){

die();

}

}

bullets.forEach((shot,si)=>{

const d = Math.hypot(
shot.x-boss.x,
shot.y-boss.y
);

if(d<boss.size){

boss.hp-=2;

bullets.splice(si,1);

if(boss.hp<=0){

player.level++;
player.coins+=100;

bosses.splice(bi,1);

inventory.push("BOSS GEM");

updateInventory();

}

}

});

});

pets.forEach(p=>{

p.x += (player.x-p.x)*0.05;
p.y += (player.y-p.y)*0.05;

});

if(player.xp >= player.level*50){

player.xp=0;
player.level++;

}

document.getElementById("level")
.textContent = player.level;

document.getElementById("xp")
.textContent = player.xp;

document.getElementById("coins")
.textContent = player.coins;

document.getElementById("hp")
.textContent =
Math.floor(player.hp);

document.getElementById("mapName")
.textContent = currentMap();

}

function drawMap(){

const map = currentMap();

if(map==="GRASSLAND")
ctx.fillStyle="#163816";

if(map==="DESERT")
ctx.fillStyle="#665522";

if(map==="ICE")
ctx.fillStyle="#335577";

if(map==="VOLCANO")
ctx.fillStyle="#441111";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

}

function draw(){

drawMap();

ctx.save();

ctx.translate(
-canvas.width/2,
-canvas.height/2
);

ctx.translate(
-player.x+canvas.width/2,
-player.y+canvas.height/2
);

for(let x=-4000;x<8000;x+=100){

for(let y=-4000;y<8000;y+=100){

ctx.strokeStyle="#ffffff08";

ctx.strokeRect(x,y,100,100);

}

}

ctx.beginPath();

ctx.strokeStyle="red";
ctx.lineWidth=20;

ctx.arc(
0,
0,
zoneRadius,
0,
Math.PI*2
);

ctx.stroke();

ctx.beginPath();
ctx.fillStyle="#00ffcc";

ctx.arc(
player.x,
player.y,
player.size,
0,
Math.PI*2
);

ctx.fill();

ctx.fillStyle="white";

ctx.fillText(
player.name,
player.x-20,
player.y-35
);

bullets.forEach(b=>{

ctx.beginPath();

ctx.fillStyle="yellow";

ctx.arc(
b.x,
b.y,
b.size,
0,
Math.PI*2
);

ctx.fill();

});

enemies.forEach(e=>{

ctx.beginPath();

ctx.fillStyle="orange";

ctx.arc(
e.x,
e.y,
e.size,
0,
Math.PI*2
);

ctx.fill();

});

bosses.forEach(b=>{

ctx.beginPath();

ctx.fillStyle="red";

ctx.arc(
b.x,
b.y,
b.size,
0,
Math.PI*2
);

ctx.fill();

ctx.fillStyle="white";

ctx.fillText(
"BOSS "+b.hp,
b.x-30,
b.y-90
);

});

pets.forEach(p=>{

ctx.beginPath();

ctx.fillStyle=p.color;

ctx.arc(
p.x,
p.y,
p.size,
0,
Math.PI*2
);

ctx.fill();

});

graves.forEach(g=>{

ctx.fillStyle="gray";

ctx.fillRect(
g.x-10,
g.y-20,
20,
40
);

ctx.fillStyle="white";

ctx.fillText(
"RIP",
g.x-10,
g.y-30
);

});

ctx.restore();

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

setInterval(spawnEnemy,1500);

loop();
</script>

</body>
</html>
